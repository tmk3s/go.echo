# version: '3' # composeファイルのバージョン /Users/tomoki/workspace/go.echo/docker-compose.yml: the attribute `version` is obsolete, it will be ignored, please remove it to avoid potential confusion 
services:
  backend: # サービス名
    build: # ビルドに使うDockerファイルのパス
      context: .
      dockerfile: ./Dockerfile
    command: air
    volumes: # マウントディレクトリ
      - ./app:/usr/src/app
    tty: true # コンテナの永続化
    stdin_open: true
    # env_file: # .envファイル
    #   - ./build/.go_env
    ports:
      - "1323:1323"
    environment:
      TZ: Asia/Tokyo
      MYSQL_ID: 'root'
      MYSQL_PASSWORD: 'pass'
      MYSQL_HOST: 'db'
      MYSQL_PORT: '3306'
      MYSQL_DATABASE: 'develop'
  front: # サービス名
    build: # ビルドに使うDockerファイルのパス
      context: .
      dockerfile: ./Dockerfile
    command: npm run dev
    working_dir: /usr/src/app/frontend/
    volumes: # マウントディレクトリ
      - ./app/frontend:/usr/src/app/frontend/
    tty: true # コンテナの永続化
    stdin_open: true
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Tokyo
  db:
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'pass'
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data:
    driver: local